<!DOCTYPE html>
<html>
<head>
  <title>Golden Apple</title>
  <link rel="stylesheet" href="./stylesheets/style.css">
  <link rel="icon" type="image/png" href="./assets/golden_apple.png">
</head>

<body>
  <h1>Admin Page</h1>

  <!-- Table container with scroll functionality -->
  <div id="table-container">
    <table>
      <thead>
        <tr>
          <th>IP Address</th>
          <th>Name</th>
          <th></th> <!-- Column for buttons -->
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Dynamic data will be inserted here -->
      </tbody>
    </table>
  </div>

  <div id="editMenu">
    <h2>Edit Menu</h2>
    <form id="editForm">
      <label for="IP Address">IP Address:</label><br>
      <input type="text" id="IP Address" name="IP Address"><br><br>
      <label for="Name">Name:</label><br>
      <input type="text" id="Name" name="Name"><br><br>
      <input type="hidden" id="oldIp" name="oldIp"/>
      <button type="submit" style="background-color: whitesmoke">Submit</button>
    </form>
    <button onclick="toggleForm('editMenu')">Close Form</button>
  </div>

  <div id="deleteConfirm" class="popup">
    <div class="popup-content">
        <p>Are you sure you want to delete this item?<br>This action can't be undone</p>
        <button id="confirmDelete">Yes, delete</button>
        <button id="cancelDelete">Cancel</button>
    </div>
  </div>

  <script>
    async function loadSwitchData() {
      try {
        const response = await fetch('/api/getAll');  // Call backend API
        const switches = await response.json();

        console.log("Switch data:", switches);

        const tableBody = document.querySelector("tbody");
        tableBody.innerHTML = ""; // Clear table

        switches.forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.ip}</td>
            <td>${row.name}</td>
            <td>
              <button class="edit-btn" onclick="editRow('${row.ip}', '${row.name}')">Edit</button>
              <button class="delete-btn" onclick="deleteRow('${row.ip}')">Delete</button>
            </td>
          `;
          tableBody.appendChild(tr);
        });
      } catch (error) {
        console.error("Error loading switch data:", error);
      }
    }

    function toggleForm(formID) {
      var formMenu = document.getElementById(formID);
      if (formMenu.style.display === "none" || formMenu.style.display === "") {
        formMenu.style.display = "block";
      } else {
        formMenu.style.display = "none";
      }
    }

    function editRow(ip, name) {
      console.log(`Editing row with IP: ${ip} and Name: ${name}`);

      // Set placeholders for IP Address and Name fields
      document.getElementById("IP Address").placeholder = ip;
      document.getElementById("Name").placeholder = name;
      document.getElementById("oldIp").value = ip;

      // Show the form menu
      toggleForm("editMenu");
    }

    function deleteRow(ip) {
      console.log(`Deleting row with IP: ${ip}`);
      const confirmationPopup = document.getElementById('deleteConfirm');
      confirmationPopup.style.display = 'block';

      // Add the event listener to "Yes, delete" only once
      const confirmDeleteButton = document.getElementById('confirmDelete');
      confirmDeleteButton.onclick = function() {
        // Here you would handle the actual deletion, such as making an AJAX request
              // Create the data object to send in the request
      const formData = {
        ip: ip
      };


      fetch('/api/delete', {
        method: 'DELETE',
        headers: {
          'Content-Type': 'application/json', // Indicating we're sending JSON data
        },
        body: JSON.stringify(formData) // Convert data to JSON format
      })
      .then(response => response.json())
      .then(data => {
        // Optionally, handle a successful response (e.g., display a message)
        alert("Deleted Successfully!");
        // Optionally close the form
        window.location.reload();
      })
      .catch(error => {
        console.error('Error during form submission:', error);
        // Optionally, handle an error (e.g., show an error message)
        alert("Error submitting the form. Please try again.");
      });

        // Close the popup after confirming deletion
        confirmationPopup.style.display = 'none';
      };

      // Add the event listener to "Cancel" button
      const cancelDeleteButton = document.getElementById('cancelDelete');
      cancelDeleteButton.onclick = function() {
        confirmationPopup.style.display = 'none'; // Close the popup
      };
    }

    // Handle form submission via JavaScript (AJAX request)
    document.getElementById('editForm').addEventListener('submit', function (event) {

      // Get the form data
      const ipElement = document.getElementById("IP Address");
      const nameElement = document.getElementById("Name");
      const ip = ipElement.value || ipElement.placeholder;
      const name = nameElement.value || nameElement.placeholder;
      const oldIp = document.getElementById("oldIp").value;

      // Create the data object to send in the request
      const formData = {
        ip: ip,
        name: name,
        oldIp: oldIp
      };

      fetch('/api/edit', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json', // Indicating we're sending JSON data
        },
        body: JSON.stringify(formData) // Convert data to JSON format
      })
      .then(response => response.json())
      .then(data => {
        console.log('Form submission successful:', data);
        // Optionally, handle a successful response (e.g., display a message)
        alert("Edited Successfully!");
        // Optionally close the form
        window.location.reload();
      })
      .catch(error => {
        console.error('Error during form submission:', error);
        // Optionally, handle an error (e.g., show an error message)
        alert("Error submitting the form. Please try again.");
      });
    });

    document.addEventListener("DOMContentLoaded", loadSwitchData);
  </script>
</body>
</html>
