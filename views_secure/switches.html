<!DOCTYPE html>
<html>
<head>
  <title>Apple Server</title>
  <link rel="stylesheet" href="./stylesheets/style.css">
  <link rel="icon" type="image/png" href="./assets/apple.png">
  <script src="./javascript/functions.js"></script>
  <style>
    .top-left-button {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      z-index: 999;
      font-size: 14px;
    }

    .top-left-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body class="switches-page">
  <button class="purple-btn" onclick="location.href='/clients'">Clients</button>

  <h1 id="title">Switches</h1>

  <input type="text" id="search-bar" placeholder="Search by IP or Name" onkeyup="filterTable()">

  <!-- Table container with scroll functionality -->
  <div id="table-container">
    <table>
      <thead>
        <tr>
          <th>IP Address</th>
          <th>Name</th>
          <th><button class="blue-btn" onclick="setMenu('add')">Add</button></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Dynamic data will be inserted here -->
      </tbody>
    </table>
  </div>

  <div id="deleteMenu" class="popup">
    <div class="popup-content">
      <div id="drag-handle"></div>
        <p style="color:crimson;">Are you sure you want to delete this item?</p>
        <h3 class="closed" id="deleteH1" style="white-space: pre-line;"></h3>
        <p style="color: crimson;">This action can't be undone.</p>
        <button class="red-btn" id="confirmDelete">Yes, delete</button>
        <button class="gray-btn" onclick="toggleMenu('deleteMenu', true)" id="cancelDelete">Cancel</button>
    </div>
  </div>

  <div id="Menu" class="popup">
    <div class="popup-content">
      <div id="drag-handle"></div>
      <h2 id="MenuH2"></h2>
      <form id="Form">
        <label for="IP Address">IP Address:</label><br>
        <input type="text" id="IP Address" name="IP Address" autocomplete="off"><br><br>
        <label for="Name">Name:</label><br>
        <input type="text" id="Name" name="Name" autocomplete="off"><br><br>
        <input type="hidden" id="menuId" name="MenuId"/>
        <button type="submit" id="submit" style="width: 45%;">Submit</button>
        <button type="button" style="width: 45%;" class="gray-btn" onclick="toggleMenu('Menu', true)">Close</button>
      </form>
      <p id="invalid-input" class="error-message" style="display: none;"></p>
    </div>
  </div>
</body>
</html>
