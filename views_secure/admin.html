<!DOCTYPE html>
<html>
<head>
  <title>Golden Apple</title>
  <link rel="stylesheet" href="./stylesheets/style.css">
  <link rel="icon" type="image/png" href="./assets/golden_apple.png">
  <script src="./javascript/functions.js"></script>
</head>

<body class="admin-page">
  <h1 id="title">Admin Page</h1>

  <input type="text" id="search-bar" placeholder="Search by IP or Name" onkeyup="filterTable()">

  <!-- Table container with scroll functionality -->
  <div id="table-container">
    <table>
      <thead>
        <tr>
          <th>IP Address</th>
          <th>Name</th>
          <th><button class="add-btn" onclick="setMenu('add')">Add</button></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Dynamic data will be inserted here -->
      </tbody>
    </table>
  </div>

  <div id="deleteMenu" class="popup">
    <div class="popup-content">
      <div id="drag-handle"></div>
        <p style="color:crimson;">Are you sure you want to delete this item?</p>
        <h3 class="closed" id="deleteH1" style="white-space: pre-line;"></h1>
        <p style="color: crimson;">This action can't be undone.</p>
        <button class="delete-btn" id="confirmDelete">Yes, delete</button>
        <button class="cancel-btn" onclick="toggleMenu('deleteMenu', true)" id="cancelDelete">Cancel</button>
    </div>
  </div>

  <div id="Menu" class="popup">
  <div class="popup-content">
    <div id="drag-handle"></div>
    <h2 id="MenuH2"></h2>
    <form id="Form">
      <label for="IP Address">IP Address:</label><br>
      <input type="text" id="IP Address" name="IP Address"><br><br>
      <label for="Name">Name:</label><br>
      <input type="text" id="Name" name="Name"><br><br>
      <input type="hidden" id="oldIp" name="oldIp"/>
      <button type="submit" id="submit" style="width: 45%;">Submit</button>
      <button type="button" style="width: 45%;" class="cancel-btn" onclick="toggleMenu('Menu', true)">Close</button>
    </form>
    <p id="invalid-input" class="error-message" style="display: none;">Please enter a valid IP address</p>
    </div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    loadSwitchData();
    
    // Redirect to login after 10 minutes
    sessionTimeout = setTimeout(function() {
      window.location.href = '/'; // Change this to your login page URL
    }, sessionTimeoutDuration);

    // Reset session timeout on button press or search bar change
    document.querySelectorAll('button').forEach(button => {
      button.addEventListener('click', resetSessionTimeout);
    });

    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', resetSessionTimeout);});

      dragable("Menu");
      dragable("deleteMenu");
  });
  </script>
</body>
</html>
