<!DOCTYPE html>
<html>
<head>
  <title>Apple Server</title>
  <link rel="stylesheet" href="./stylesheets/style.css">
  <link rel="icon" type="image/png" href="./assets/apple.ico">
  <script src="./javascript/functions.js"></script>
  <script src="./javascript/logs.js"></script>
</head>

<body>
  <button class="purple-btn" onclick="location.href='/devices'">Devices</button>
  <button class="purple-btn" onclick="location.href='/clients'">Clients</button>

  <h1 id="title">Logs</h1>

  
  <input type="text" id="search-bar" placeholder="Search Here" oninput="filterLogs()" autocomplete="off">

  <!-- Table container with scroll functionality -->
  <div id="table-container" style="width:1100px;">
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th width="14%">Time</th>
          <th width="16%">Actor</th>
          <th width="16%">IP</th>
          <th width="15%">Name</th>
          <th width="4%">Location</th>
          <th width="16%">New IP</th>
          <th width="15%">New Name</th>
          <th width="4%">New Location</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Dynamic data will be inserted here -->
      </tbody>
    </table>
  </div>
</body>
</html>
