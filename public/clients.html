<!DOCTYPE html>
<html>
<head>
  <title>Apple Server</title>
  <link rel="stylesheet" href="./stylesheets/style.css">
  <link rel="icon" type="image/png" href="./assets/apple.png">
  <script src="./javascript/functions.js"></script>
</head>
<body class="clients-page">
  <h1 id="title">Connected Clients</h1>
  
  <!-- Table container with scroll functionality -->
  <div id="table-container">
    <button class="purple-btn" onclick="location.href='/switches'">Switches</button>

    <table>
      <thead>
        <tr>
          <th>IP Address</th>
          <th>Last Activity</th>
        </tr>
      </thead>
      <tbody id="clients-table-body">
        <!-- Dynamic data will be inserted here -->
      </tbody>
    </table>
  </div>

  <br><br><br><br>

  <h1>Whitelisted Clients</h1>
  <h2 id = "success-message" class="success">Successfully</h2>
  
  <!-- Table container with scroll functionality -->
  <div id="table-container">
    <button class="purple-btn" onclick="location.href='/switches'">Switches</button>

    <table>
      <thead>
        <tr>
          <th>IP Address</th>
          <th>Name</th>
          <th><button class="blue-btn" onclick="addWhitelistMenu()">Add</button></th>
        </tr>
      </thead>
      <tbody id="whitelist-table-body">
        <!-- Dynamic data will be inserted here -->
      </tbody>
    </table>
  </div>

<div id="removeWhitelistMenu" class="popup">
  <div class="popup-content">
    <div id="drag-handle"></div>
      <p style="color:crimson;">Are you sure you want to remove this IP?</p>
      <h3 class="closed" id="removeWhitelistH1" style="white-space: pre-line;"></h3>
      <p style="color: crimson;">This action can't be undone.</p>
      <button class="red-btn" id="confirmRemoveWhitelist">Yes, remove</button>
      <button class="gray-btn" id="cancelRemoveWhitelist" onclick="removeWhitelistMenu()">Cancel</button>
    </div>
  </div>
</div>

  <div id="addWhitelistMenu" class="popup">
    <div class="popup-content">
      <div id="drag-handle"></div>
      <h2 id="MenuH2"></h2>
      <form id="Form">
        <label for="IP Address">IP Address:</label><br>
        <input type="text" id="IP Address" name="IP Address" autocomplete="off"><br><br>
        <label for="Name">Name:</label><br>
        <input type="text" id="Name" name="Name" autocomplete="off"><br><br>
        <input type="hidden" id="menuId" name="MenuId"/>
        <button type="submit" id="submit" style="width: 45%;">Submit</button>
        <button type="button" style="width: 45%;" class="gray-btn" onclick="addWhitelistMenu()">Close</button>
      </form>
      <p id="invalid-input" class="error-message" style="display: none;"></p>
    </div>
  </div>
</body>
</html>
